<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Love ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- القلوب -->
    <div id="hearts"></div>

    <!-- صفحة كلمة السر -->
    <div class="login-page" id="login">

        <div class="heart">❤️</div>

        <h1>كلمة السر</h1>

        <input
            type="password"
            id="password"
            placeholder="اكتب كلمة السر">

        <button onclick="checkPassword()">
            دخول ❤️
        </button>

        <p id="error"></p>

    </div>

    <!-- الصفحة الرئيسية -->
    <div class="main-page hidden" id="main">

        <h1>❤️ ليكي رسالة ❤️</h1>

        <p id="typing"></p>

        <div class="gallery">

            <img src="img1.jpg">

            <img src="img2.jpg">

            <img src="img3.jpg">

            <img src="img4.jpg">

        </div>

        <video controls>

            <source src="video.MP4" type="video/mp4">

        </video>

        <h2>🫂❤️</h2>

    </div>

    <script src="script.js"></script>

</body>

</html>
